<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - NLP Annot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-lg text-slate-900 tracking-tight">NLP Annotation</span>
                </div>
                <div class="flex items-center space-x-6 text-sm">
                    <a th:href="@{/annotator}" class="text-slate-500 hover:text-slate-900 transition-colors">Tableau de bord</a>
                    <a th:href="@{/annotator/stats}" class="text-slate-500 hover:text-slate-900 transition-colors">Statistiques</a>
                    <a th:href="@{/annotator/profile}" class="text-blue-600 font-medium">Profil</a>
                    <div class="w-px h-4 bg-slate-300"></div>
                    <span class="text-slate-700 font-medium" th:text="${annotator.prenom + ' ' + annotator.nom}">Amina</span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="text-slate-400 hover:text-red-600 transition-colors" title="Déconnexion">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Paramètres du profil</h1>
            <p class="text-sm text-slate-500 mt-1">Gérez vos informations personnelles et vos paramètres de sécurité.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Informations -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                <h3 class="font-semibold text-slate-800 mb-6">Informations personnelles</h3>

                <div th:if="${successMessage}" class="mb-4 p-3 rounded-md bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm">
                    <span th:text="${successMessage}"></span>
                </div>
                <div th:if="${errorMessage}" class="mb-4 p-3 rounded-md bg-red-50 border border-red-100 text-red-700 text-sm">
                    <span th:text="${errorMessage}"></span>
                </div>

                <form th:action="@{/annotator/profile/update}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nom</label>
                        <input type="text" name="nom" th:value="${annotator.nom}" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Prénom</label>
                        <input type="text" name="prenom" th:value="${annotator.prenom}" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Identifiant de connexion</label>
                        <input type="text" name="login" th:value="${annotator.login}" required readonly
                               class="w-full px-3 py-2 border border-slate-200 bg-slate-50 text-slate-500 rounded-md shadow-sm cursor-not-allowed text-sm">
                    </div>
                    <div class="pt-2">
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            Enregistrer les modifications
                        </button>
                    </div>
                </form>
            </div>

            <!-- Mot de passe -->
            <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
                <h3 class="font-semibold text-slate-800 mb-6">Sécurité</h3>

                <div th:if="${successPassword}" class="mb-4 p-3 rounded-md bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm">
                    <span th:text="${successPassword}"></span>
                </div>
                <div th:if="${errorPassword}" class="mb-4 p-3 rounded-md bg-red-50 border border-red-100 text-red-700 text-sm">
                    <span th:text="${errorPassword}"></span>
                </div>

                <form th:action="@{/annotator/profile/password}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe actuel</label>
                        <input type="password" name="currentPassword" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nouveau mot de passe</label>
                        <input type="password" name="newPassword" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Confirmer le mot de passe</label>
                        <input type="password" name="confirmPassword" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    </div>
                    <div class="pt-2">
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-slate-300 rounded-md shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            Mettre à jour le mot de passe
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="mt-auto bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-500">
        &copy; 2026 NLP Annotation.
    </footer>

</body>
</html>
