<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Première connexion - Annota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <base target="_blank">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 text-slate-800 font-sans min-h-screen flex items-center justify-center">

<div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8 w-full max-w-md">
    <div class="text-center mb-6">
        <i class="fas fa-lock text-slate-700 text-3xl mb-2"></i>
        <h2 class="text-2xl font-bold text-slate-800">Première connexion</h2>
        <p class="text-slate-500 text-sm mt-1">
            Veuillez saisir votre mot de passe temporaire et définir un nouveau.
        </p>
    </div>

    <div th:if="${error}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
        <i class="fas fa-exclamation-circle mr-1"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/first-login}" method="post" class="space-y-5">
        <input type="hidden" name="token" th:value="${token}">

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Login</label>
            <input type="text" th:value="${login}" disabled
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Mot de passe temporaire</label>
            <input type="password" name="tempPassword" required
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-slate-500 focus:ring-2 focus:ring-slate-200 outline-none transition-all"
                   placeholder="Celui reçu par email">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Nouveau mot de passe</label>
            <input type="password" name="nouveauMdp" required minlength="6"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-slate-500 focus:ring-2 focus:ring-slate-200 outline-none transition-all"
                   placeholder="Minimum 6 caractères">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Confirmer le mot de passe</label>
            <input type="password" name="confirmationMdp" required minlength="6"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-slate-500 focus:ring-2 focus:ring-slate-200 outline-none transition-all"
                   placeholder="Répétez le mot de passe">
        </div>

        <button type="submit"
                class="w-full px-4 py-2.5 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-medium transition-colors shadow-sm">
            <i class="fas fa-check mr-2"></i>Valider
        </button>
    </form>

    <div class="mt-4 text-center">
        <a th:href="@{/login}" class="text-sm text-slate-500 hover:text-slate-900 transition-colors">
            Retour à la connexion
        </a>
    </div>
</div>

</body>
</html>
