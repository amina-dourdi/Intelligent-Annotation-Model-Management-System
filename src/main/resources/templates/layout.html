<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Administration - NLP Annot'">Administration - NLP Annot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
        <div class="p-6 border-b border-slate-200">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight flex items-center">
                <i class="fas fa-layer-group text-blue-600 mr-2"></i> NLP Annot
            </h1>
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto" sec:authorize="hasRole('ADMIN')">
            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 mt-4 px-3">Menu Principal</div>
            <a th:href="@{/admin/dashboard}"
               class="flex items-center px-3 py-2.5 rounded-md text-sm font-medium text-slate-700 hover:text-blue-600 hover:bg-blue-50 transition-colors">
                <i class="fas fa-chart-pie w-6 text-center text-slate-400"></i>
                <span class="ml-2">Tableau de bord</span>
            </a>
            <a th:href="@{/admin/datasets}"
               class="flex items-center px-3 py-2.5 rounded-md text-sm font-medium text-slate-700 hover:text-blue-600 hover:bg-blue-50 transition-colors">
                <i class="fas fa-database w-6 text-center text-slate-400"></i>
                <span class="ml-2">Datasets</span>
            </a>
            <a th:href="@{/admin/annotateurs}"
               class="flex items-center px-3 py-2.5 rounded-md text-sm font-medium text-slate-700 hover:text-blue-600 hover:bg-blue-50 transition-colors">
                <i class="fas fa-users w-6 text-center text-slate-400"></i>
                <span class="ml-2">Utilisateurs</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-200">
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit"
                        class="w-full flex items-center px-3 py-2.5 rounded-md text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 transition-colors">
                    <i class="fas fa-sign-out-alt w-6 text-center text-slate-400 group-hover:text-red-600"></i>
                    <span class="ml-2">Déconnexion</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50">
        <!-- Top bar -->
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center z-10 shrink-0">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight" th:text="${pageTitle}">Titre de la page</h2>
            <div class="flex items-center gap-3">
                <div class="flex flex-col text-right">
                    <span class="text-sm font-medium text-slate-900" sec:authentication="name">Admin</span>
                    <span class="text-xs text-slate-500">Administrateur</span>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-100 border border-blue-200 flex items-center justify-center text-blue-700 font-bold text-sm">
                    A
                </div>
            </div>
        </header>

        <!-- Page Content Scrollable Area -->
        <div class="flex-1 overflow-y-auto">
            <!-- Alerts -->
            <div class="px-8 pt-6">
                <div th:if="${success}" class="mb-4 p-4 rounded-md bg-emerald-50 border border-emerald-100 text-emerald-700 text-sm flex items-center shadow-sm">
                    <i class="fas fa-check-circle mr-3"></i>
                    <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="mb-4 p-4 rounded-md bg-red-50 border border-red-100 text-red-700 text-sm flex items-center shadow-sm">
                    <i class="fas fa-exclamation-triangle mr-3"></i>
                    <span th:text="${error}"></span>
                </div>
            </div>

            <!-- Injected Content -->
            <div class="p-8 pt-2">
                <div th:replace="${content}"></div>
            </div>
            
            <!-- Footer inside main -->
            <footer class="mt-auto px-8 py-6 text-center text-xs text-slate-500 border-t border-slate-200">
                &copy; 2026 NLP Annotation. Interface d'administration.
            </footer>
        </div>
    </main>
</div>

</body>
</html>
