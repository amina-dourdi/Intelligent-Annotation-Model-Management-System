<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - NLP Annotation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <main class="container">
        <div class="login-wrapper">
            <div class="login-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-size: 48px; margin-bottom: 15px;">🧠</div>
                    <h1 class="login-title">NLP Annotation</h1>
                    <p class="login-subtitle">Plateforme d'annotation collaborative</p>
                </div>

                <div th:if="${param.error}" class="login-alert alert-error">
                    <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> Login ou mot de passe incorrect
                </div>

                <div th:if="${param.logout}" class="login-alert alert-success">
                    <i class="fas fa-check-circle" style="margin-right: 8px;"></i> Déconnexion réussie
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="username">Identifiant (Login)</label>
                        <div style="position: relative;">
                            <i class="fas fa-user" style="position: absolute; left: 14px; top: 14px; color: var(--text-secondary);"></i>
                            <input type="text" id="username" name="username" class="form-control" style="padding-left: 40px;" placeholder="Entrez votre identifiant" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 30px;">
                        <label class="form-label" for="password">Mot de passe</label>
                        <div style="position: relative;">
                            <i class="fas fa-lock" style="position: absolute; left: 14px; top: 14px; color: var(--text-secondary);"></i>
                            <input type="password" id="password" name="password" class="form-control" style="padding-left: 40px; padding-right: 40px;" placeholder="Entrez votre mot de passe" required>
                            <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 14px; top: 14px; color: var(--text-secondary); cursor: pointer;" onclick="toggleVisibility('password', 'togglePassword')"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn" style="width: 100%; font-size: 16px; padding: 12px;">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            &copy; 2026 - Plateforme d'Annotation NLP Collaborative
        </div>
    </footer>

    <script>
        function toggleVisibility(inputId, iconId) {
            var input = document.getElementById(inputId);
            var icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
