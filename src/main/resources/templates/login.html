<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - NLP Annotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
        
        <!-- Header -->
        <div class="px-8 pt-8 pb-6 border-b border-slate-100 text-center">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">NLP Annotation</h1>
            <p class="text-sm text-slate-500 mt-1">Veuillez vous identifier pour continuer</p>
        </div>

        <!-- Body -->
        <div class="px-8 py-6">
            
            <div th:if="${param.error}" class="mb-4 px-4 py-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-md">
                Identifiant ou mot de passe incorrect.
            </div>

            <div th:if="${param.logout}" class="mb-4 px-4 py-3 bg-emerald-50 border border-emerald-100 text-emerald-600 text-sm rounded-md">
                Déconnexion réussie.
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Identifiant</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Se connecter
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Footer -->
        <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 text-center text-xs text-slate-500">
            &copy; 2026 NLP Annotation. Tous droits réservés.
        </div>
    </div>

</body>
</html>
