<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - NLP Annot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-emerald-500 rounded-xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-tags text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">NLP Annot</h1>
        <p class="text-slate-500 text-sm mt-1">Plateforme d'annotation collaborative</p>
    </div>

    <div th:if="${param.error}" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm text-center">
        Login ou mot de passe incorrect
    </div>

    <div th:if="${param.logout}" class="mb-4 p-3 bg-emerald-50 border border-emerald-200 text-emerald-600 rounded-lg text-sm text-center">
        Déconnexion réussie
    </div>

    <form th:action="@{/authenticateTheUser}" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Login</label>
            <div class="relative">
                <i class="fas fa-user absolute left-3 top-3 text-slate-400"></i>
                <input type="text" name="username" required
                       class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all"
                       placeholder="Votre login">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Mot de passe</label>
            <div class="relative">
                <i class="fas fa-lock absolute left-3 top-3 text-slate-400"></i>
                <input type="password" name="password" required
                       class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all"
                       placeholder="Votre mot de passe">
            </div>
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg font-medium transition-colors shadow-sm">
            <i class="fas fa-sign-in-alt mr-2"></i>Se connecter
        </button>
    </form>
</div>

</body>
</html>
