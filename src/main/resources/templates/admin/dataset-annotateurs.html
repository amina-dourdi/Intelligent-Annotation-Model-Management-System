<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Affecter des Annotateurs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 text-slate-800 font-sans min-h-screen">

<!-- Navbar -->
<nav class="bg-white/80 backdrop-blur border-b border-slate-100 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
    <div class="flex items-center gap-3">
        <i class="fas fa-tags text-slate-700 text-xl"></i>
        <span class="font-bold text-lg text-slate-900">NLP Annot</span>
    </div>
    <div class="flex items-center gap-6">
        <a th:href="@{/admin/dashboard}" class="text-slate-500 hover:text-slate-900 transition">Dashboard</a>
        <a th:href="@{/admin/datasets}" class="text-slate-900 font-medium">Datasets</a>
        <a th:href="@{/admin/annotateurs}" class="text-slate-500 hover:text-slate-900 transition">Annotateurs</a>
        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="text-slate-400 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </form>
    </div>
</nav>

<div class="p-8 max-w-3xl mx-auto">

    <!-- Messages -->
    <div th:if="${error}" class="mb-4 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 flex items-center">
        <i class="fas fa-exclamation-circle mr-3"></i>
        <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="mb-4 p-4 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 flex items-center">
        <i class="fas fa-check-circle mr-3"></i>
        <span th:text="${success}"></span>
    </div>

    <div class="mb-6">
        <a th:href="@{/admin/datasets}" class="text-slate-500 hover:text-slate-900 text-sm transition">
            <i class="fas fa-arrow-left mr-1"></i>Retour aux datasets
        </a>
        <h2 class="text-2xl font-bold text-slate-800 mt-2">
            Affecter des annotateurs — <span th:text="${dataset.nomDataset}" class="text-slate-700">NLI-FR</span>
        </h2>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8">
        <form th:action="@{/admin/datasets/{id}/affecter(id=${dataset.id})}" method="post" class="space-y-6">

            <!-- Date limite (obligatoire pour le backend) -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Date limite d'annotation</label>
                <input type="date" name="dateLimite" required
                       class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-slate-500 focus:ring-2 focus:ring-slate-200 outline-none">
            </div>

            <!-- Liste des annotateurs avec checkbox -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-3">
                    Sélectionner les annotateurs <span class="text-slate-400 font-normal">(minimum 3)</span>
                </label>

                <div class="border border-slate-300 rounded-lg overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800 text-white text-xs uppercase">
                        <tr>
                            <th class="px-4 py-3 font-medium">Annotateur</th>
                            <th class="px-4 py-3 font-medium text-center w-20">Sélection</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                        <tr th:each="a : ${annotateurs}" class="hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-3 text-slate-700">
                                <span th:text="${a.nom + ' ' + a.prenom}">Kamali Said</span>
                                <span class="text-xs text-slate-400 ml-2" th:text="'(' + ${a.login} + ')'">(k.said)</span>
                            </td>
                            <td class="px-4 py-3 text-center">
                                <input type="checkbox" name="annotateurIds" th:value="${a.id}"
                                       th:checked="${idsAffectes != null && idsAffectes.contains(a.id)}"
                                       class="w-5 h-5 text-emerald-500 border-slate-300 rounded focus:ring-slate-500 cursor-pointer">
                            </td>
                        </tr>
                        <tr th:if="${annotateurs == null or annotateurs.isEmpty()}">
                            <td colspan="2" class="px-4 py-6 text-center text-slate-400">
                                Aucun annotateur disponible
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Boutons -->
            <div class="flex gap-4 pt-2">
                <a th:href="@{/admin/datasets}"
                   class="flex-1 px-4 py-2.5 border border-slate-300 text-slate-600 rounded-lg text-center hover:bg-slate-50 transition-colors font-medium">
                    Annuler
                </a>
                <button type="submit"
                        class="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-medium transition-colors shadow-sm">
                    <i class="fas fa-check mr-2"></i>Valider
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
