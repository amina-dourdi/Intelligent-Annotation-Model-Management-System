<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 text-slate-800 font-sans min-h-screen">

<!-- Navbar -->
<nav class="bg-white/80 backdrop-blur border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
    <div class="flex items-center gap-3">
        <i class="fas fa-tags text-slate-700 text-xl"></i>
        <span class="font-bold text-lg text-slate-900">NLP Annot</span>
    </div>
    <div class="flex items-center gap-6 text-sm">
        <a th:href="@{/admin/dashboard}" class="text-slate-900 font-medium">Dashboard</a>
        <a th:href="@{/admin/datasets}" class="text-slate-500 hover:text-slate-900 transition">Datasets</a>
        <a th:href="@{/admin/annotateurs}" class="text-slate-500 hover:text-slate-900 transition">Annotateurs</a>
        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="text-slate-400 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </form>
    </div>
</nav>

<div class="p-8 max-w-6xl mx-auto">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900">Tableau de bord</h1>
        <p class="text-slate-500 text-sm mt-1">Vue d'ensemble de l'activité d'annotation</p>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-sky-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-database text-sky-600 text-xl"></i>
                </div>
                <div>
                    <h3 class="text-3xl font-bold text-slate-800" th:text="${totalDatasets}">0</h3>
                    <p class="text-slate-500 text-sm">Datasets créés</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-teal-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-users text-teal-600 text-xl"></i>
                </div>
                <div>
                    <h3 class="text-3xl font-bold text-slate-800" th:text="${totalAnnotateurs}">0</h3>
                    <p class="text-slate-500 text-sm">Annotateurs actifs</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-violet-100 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-file-alt text-violet-600 text-xl"></i>
                </div>
                <div>
                    <h3 class="text-3xl font-bold text-slate-800" th:text="${totalCouples}">0</h3>
                    <p class="text-slate-500 text-sm">Couples de texte</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Datasets -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
            <h3 class="font-semibold text-slate-900">Datasets récents</h3>
            <a th:href="@{/admin/datasets/nouveau}"
               class="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg text-sm font-medium transition-colors">
                <i class="fas fa-plus mr-2"></i>Nouveau
            </a>
        </div>
        <table class="w-full text-left">
            <!-- ✅ Ligne d'en-tête colorée -->
            <thead class="bg-slate-800 text-white text-xs uppercase">
            <tr>
                <th class="px-6 py-3 font-medium">Nom</th>
                <th class="px-6 py-3 font-medium">Fichier</th>
                <th class="px-6 py-3 font-medium">Date</th>
                <th class="px-6 py-3 font-medium text-right"></th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
            <tr th:each="ds : ${datasets}" class="hover:bg-slate-50 transition">
                <td class="px-6 py-4 font-medium text-slate-900" th:text="${ds.nomDataset}">NLI-AR</td>
                <td class="px-6 py-4 text-slate-500 text-sm" th:text="${ds.fichierNom}">data.csv</td>
                <td class="px-6 py-4 text-slate-500 text-sm"
                    th:text="${#temporals.format(ds.dateCreation, 'dd/MM/yyyy HH:mm')}">--</td>
                <td class="px-6 py-4 text-right">
                    <a th:href="@{/admin/datasets/{id}(id=${ds.id})}"
                       class="text-slate-600 hover:text-slate-900 text-sm font-medium">
                        Détails <i class="fas fa-arrow-right ml-1"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${datasets == null or datasets.isEmpty()}">
                <td colspan="4" class="px-6 py-8 text-center text-slate-400">
                    Aucun dataset pour l'instant
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
