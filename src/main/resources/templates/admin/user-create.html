<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvel Annotateur - Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<!-- Navigation -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <span class="font-bold text-lg text-slate-900 tracking-tight flex items-center">
                    <i class="fas fa-layer-group text-blue-600 mr-2"></i> NLP Annot Admin
                </span>
            </div>
            <div class="flex items-center space-x-6 text-sm">
                <a th:href="@{/admin/dashboard}" class="text-slate-500 hover:text-slate-900 transition-colors">Tableau de bord</a>
                <a th:href="@{/admin/datasets}" class="text-slate-500 hover:text-slate-900 transition-colors">Datasets</a>
                <a th:href="@{/admin/annotateurs}" class="text-blue-600 font-medium">Utilisateurs</a>
                <div class="w-px h-4 bg-slate-300"></div>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="text-slate-400 hover:text-red-600 transition-colors" title="Déconnexion">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="mb-6">
        <a th:href="@{/admin/annotateurs}" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors mb-2">
            <i class="fas fa-arrow-left mr-2"></i> Retour à la liste
        </a>
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Nouvel Annotateur</h2>
        <p class="text-sm text-slate-500 mt-1">
            Le mot de passe sera généré automatiquement et envoyé par email à l'utilisateur.
        </p>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <form th:action="@{/admin/annotateurs/nouveau}" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nom</label>
                <input type="text" name="nom" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Prénom</label>
                <input type="text" name="prenom" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Identifiant</label>
                <input type="text" name="login" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm"
                       placeholder="ex: prenom.nom">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm"
                       placeholder="ex: prenom.nom@domaine.com">
            </div>

            <div class="pt-4 flex gap-3">
                <a th:href="@{/admin/annotateurs}"
                   class="flex-1 inline-flex justify-center py-2 px-4 border border-slate-300 rounded-md shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Annuler
                </a>
                <button type="submit"
                        class="flex-1 inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Créer le compte
                </button>
            </div>
        </form>
    </div>
</main>

<footer class="mt-auto bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-500">
    &copy; 2026 NLP Annotation. Interface d'administration.
</footer>

</body>
</html>
